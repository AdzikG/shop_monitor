{% extends "base.html" %}
{% block title %}Konfiguracja admina — WACEK{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <h2 style="font-size: 14px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent-yellow); margin-bottom: 0.5rem;">
        Pierwszy start
    </h2>
    <p style="color: var(--text-secondary); font-size: 11px; margin-bottom: 2rem;">
        Brak użytkowników w systemie. Utwórz konto administratora.
    </p>

    {% if error %}
    <div style="color: var(--accent-red); font-size: 11px; margin-bottom: 1rem; border: 1px solid var(--accent-red); padding: 0.5rem 0.75rem;">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/auth/setup">
        <div style="margin-bottom: 1rem;">
            <label style="display:block; font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--text-secondary); margin-bottom:0.4rem;">Login admina</label>
            <input type="text" name="username" autofocus required
                pattern="[a-z]+_[a-z]+" title="Format: imie_nazwisko (tylko małe litery i podkreślnik)"
                placeholder="jan_kowalski"
                style="width:100%;box-sizing:border-box;background:var(--bg-dark);border:1px solid var(--border);color:var(--text-primary);padding:0.5rem 0.75rem;font-family:'Fira Code',monospace;font-size:13px;">
            <div style="font-size:10px;color:var(--text-secondary);margin-top:0.3rem;">Format: imie_nazwisko</div>
        </div>

        <div style="margin-bottom: 1rem;">
            <label style="display:block; font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--text-secondary); margin-bottom:0.4rem;">Hasło</label>
            <input type="password" name="password" required
                style="width:100%;box-sizing:border-box;background:var(--bg-dark);border:1px solid var(--border);color:var(--text-primary);padding:0.5rem 0.75rem;font-family:'Fira Code',monospace;font-size:13px;">
        </div>

        <div style="margin-bottom: 1.5rem;">
            <label style="display:block; font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--text-secondary); margin-bottom:0.4rem;">Powtórz hasło</label>
            <input type="password" name="password2" required
                style="width:100%;box-sizing:border-box;background:var(--bg-dark);border:1px solid var(--border);color:var(--text-primary);padding:0.5rem 0.75rem;font-family:'Fira Code',monospace;font-size:13px;">
        </div>

        <button type="submit" style="background:var(--accent-green);border:none;color:var(--bg-dark);padding:0.5rem 1.5rem;cursor:pointer;font-family:inherit;font-size:11px;text-transform:uppercase;font-weight:700;letter-spacing:1px;">
            Utwórz admina
        </button>
    </form>
</div>
{% endblock %}
